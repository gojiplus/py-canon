name: Reusable Release

on:
  workflow_call:
    inputs:
      publish-pypi:
        description: 'Publish to (Test)PyPI (requires a trusted publisher configured)'
        type: boolean
        default: true
      testpypi:
        description: 'Publish to TestPyPI instead of PyPI'
        type: boolean
        default: false
      github-release:
        description: 'Create a GitHub Release with generated notes'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # dynamic versioning reads tags
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Build distributions
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    if: inputs.publish-pypi
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.testpypi && 'testpypi' || 'pypi' }}
    permissions:
      id-token: write  # trusted publishing + attestations
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish (trusted publishing, PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          attestations: true
          repository-url: ${{ inputs.testpypi && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}

  github-release:
    if: >-
      !cancelled() && inputs.github-release && startsWith(github.ref, 'refs/tags/') &&
      needs.build.result == 'success' &&
      (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    needs: [build, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" --generate-notes --verify-tag
