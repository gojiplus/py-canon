name: Reusable CI

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'JSON array of Python versions to test'
        type: string
        default: '["3.11", "3.14"]'
      os:
        description: 'JSON array of runner images for the test matrix'
        type: string
        default: '["ubuntu-latest"]'
      coverage-floor:
        description: 'Fail tests below this coverage percent (0 disables)'
        type: number
        default: 0
      run-pydoclint:
        description: 'Run pydoclint in the lint job'
        type: boolean
        default: true
      run-preen:
        description: 'Run preen check --strict in the lint job'
        type: boolean
        default: false
      wheel-import:
        description: 'Import name to smoke-test from the built wheel (defaults to repo package auto-detect)'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Sync environment
        run: |
          if [ -f uv.lock ]; then uv sync --frozen --all-groups; else uv sync --all-groups; fi
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Pyright
        run: uv run pyright
      - name: Pydoclint
        if: inputs.run-pydoclint
        run: |
          if [ -d src ]; then uv run pydoclint src/; else echo "no src/, skipping"; fi
      - name: Preen conformance
        if: inputs.run-preen
        run: uvx preen check --strict

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
        os: ${{ fromJSON(inputs.os) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync environment
        run: |
          if [ -f uv.lock ]; then uv sync --frozen --all-groups; else uv sync --all-groups; fi
      - name: Run tests
        env:
          COVERAGE_FLOOR: ${{ inputs.coverage-floor }}
        run: |
          if [ "$COVERAGE_FLOOR" != "0" ]; then
            uv run pytest --cov --cov-report=term-missing --cov-fail-under="$COVERAGE_FLOOR"
          else
            uv run pytest
          fi

  wheel:
    name: Test built wheel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # dynamic versioning needs tags
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Build
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - name: Install wheel in clean env and test
        env:
          WHEEL_IMPORT: ${{ inputs.wheel-import }}
        run: |
          uv venv /tmp/wheelenv
          . /tmp/wheelenv/bin/activate
          uv pip install dist/*.whl
          uv pip install --group test . 2>/dev/null || uv pip install pytest
          import_name="$WHEEL_IMPORT"
          if [ -z "$import_name" ]; then
            import_name=$(basename src/*/ 2>/dev/null | head -1 | tr - _)
          fi
          python -c "import $import_name; print('import OK:', '$import_name')"
          if [ -d tests ]; then python -m pytest tests/ -q; fi

  workflow-security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Zizmor (Actions security lint)
        run: uvx zizmor --min-severity high .github/workflows/

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: never
